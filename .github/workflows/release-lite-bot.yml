name: Release torchflower-lite-bot

on:
  push:
    tags:
      - "lite-v*"

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build -p torchflower-lite-bot --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/torchflower-lite-bot dist/
          tar -czf dist/torchflower-lite-bot-${{ matrix.target }}.tar.gz -C dist torchflower-lite-bot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torchflower-lite-bot-${{ matrix.target }}
          path: dist/*.tar.gz

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}