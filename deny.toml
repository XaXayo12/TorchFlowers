[advisories]
version = 2
yanked = "warn"
ignore = [
  "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
